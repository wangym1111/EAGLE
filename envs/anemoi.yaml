# yamllint disable rule:anchors rule:line-length

channels:
  - nodefaults
  - conda-forge
  - ufs-community
dependencies:
  - flash-attn 2.8.*
  - matplotlib >=3.7.1,<3.9 # low bound per anemoi-training; high bound per matplotlib Issue 28317
