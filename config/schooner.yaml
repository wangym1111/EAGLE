# Configuration for the NOAA RDHPCS Ursa platform.

# yamllint disable rule:anchors rule:line-length

app:
  gpu:
    batchargs: &gpu-batchargs
      --gres: 'gpu:h100:1'
      nodes: 1
      partition: map_gpu_el9
      #queue: gpuwf
  launcher: mpirun
  partitions:
    netaccess: map_el9
  platform: &platform
    account: general
    scheduler: slurm
inference:
  execution:
    envcmds: !list '{{ val.slurm_script + val.inference.envcmds  }}'
training:
  execution:
    envcmds: !list '{{ val.slurm_script + val.training.envcmds }}'
val:
  slurm_script:
    - source /etc/profile.d/profile-slurm.sh
zarrs:
  common:
    execution:
      batchargs:
        --mem-per-cpu: 3G
      #envcmds: !list '{{ val.slurm_script + val.zarrs.envcmds }}'
      mpiargs:
        - "--export=ALL"
